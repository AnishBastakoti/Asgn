        <div class="col-md-6 mb-4">
            <div class="card shadow border-0">
                <div class="card-header bg-white py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Top Hiring Entities</h6>
                </div>
                <div class="card-body">
                    <canvas id="companyChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">

                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>City</th>
                                    <th>Volume</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="leadCityTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12 mb-4">
            <div class="card shadow border-0">
                <div class="card-header bg-white py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Skill Overlap Matrix (Occupation Similarity)</h6>
                </div>
                <div class="card-body overflow-auto">
                    <div id="overlapHeatmapContainer" style="min-width: 600px;">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Injecting the structured JSON from FastAPI
    const apiData = {{ data | tojson | safe }};
    const BRAND_ORANGE = '#F05D23'; // Matching your SkillPulse brand
    const BRAND_BLUE = '#2C3E50';

    // --- CHART 1: CITIES (Horizontal Bar) ---
    new Chart(document.getElementById('cityChart'), {
        type: 'bar',
        data: {
            labels: apiData.cities.map(d => d.city),
            datasets: [{
                label: 'Postings',
                data: apiData.cities.map(d => d.job_count),
                backgroundColor: BRAND_ORANGE,
                borderRadius: 5
            }]
        },
        options: { 
            indexAxis: 'y',
            plugins: { legend: { display: false } },
            scales: { x: { grid: { display: false } } }
        }
    });

    // --- CHART 2: TRENDS (Multi-Line) ---
    const trendDatasets = apiData.trends.map((skill, i) => ({
        label: skill.skill_name,
        data: skill.points.map(p => ({ x: p.date, y: p.count })),
        borderColor: `hsl(${i * 45}, 70%, 50%)`,
        tension: 0.4,
        pointRadius: 2
    }));

    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: { datasets: trendDatasets },
        options: {
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 10 } } },
            scales: { y: { beginAtZero: true, grid: { color: '#f0f0f0' } } }
        }
    });

    // --- CHART 3: COMPANIES (Doughnut) ---
    new Chart(document.getElementById('companyChart'), {
        type: 'doughnut',
        data: {
            labels: apiData.companies.map(d => d.company),
            datasets: [{
                data: apiData.companies.map(d => d.postings),
                backgroundColor: [BRAND_ORANGE, BRAND_BLUE, '#95a5a6', '#ecf0f1', '#3498db']
            }]
        },
        options: { cutout: '70%' }
    });

    // --- DATA 4: LEAD CITIES (Table Rendering) ---
    const leadTbody = document.getElementById('leadCityTableBody');
    apiData.leads.slice(0, 5).forEach(item => {
        const row = `<tr>
            <td><strong>#${item.rank}</strong></td>
            <td>${item.city}</td>
            <td>${item.total_postings}</td>
            <td>${item.is_lead ? '<span class="badge bg-success">Trend Setter</span>' : '<span class="badge bg-light text-dark">Follower</span>'}</td>
        </tr>`;
        leadTbody.innerHTML += row;
    });

    // --- CHART 5: OVERLAP (Matrix/Heatmap Implementation) ---
    // Using a Bubble chart to simulate a Heatmap without extra plugins
    const overlapData = [];
    apiData.overlap.matrix.forEach((row, i) => {
        row.forEach((val, j) => {
            overlapData.push({ x: apiData.overlap.occupations[j], y: apiData.overlap.skills[i], v: val });
        });
    });

    new Chart(document.getElementById('overlapChart'), {
        type: 'bubble',
        data: {
            datasets: [{
                data: overlapData.map(d => ({ x: d.x, y: d.y, r: d.v * 2 })),
                backgroundColor: BRAND_ORANGE
            }]
        },
        options: {
            scales: {
                x: { type: 'category', labels: apiData.overlap.occupations },
                y: { type: 'category', labels: apiData.overlap.skills }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: (ctx) => `Overlap Score: ${ctx.raw.r / 2}`
                    }
                }
            }
        }
    });
</script>
