<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillPulse — Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #E7E7E7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #212121;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    /* Brand header */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: #E9713C;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: #fff;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 20px;
      font-weight: 800;
      color: #212121;
      letter-spacing: -0.02em;
    }
    .brand-sub {
      font-size: 10px;
      color: #9CA3AF;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Cascadia Code', 'Consolas', monospace;
    }

    /* Card */
    .login-card {
      background: #FFFFFF;
      border: 1px solid rgba(33,33,33,0.1);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 1px 3px rgba(33,33,33,0.08);
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #212121;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: #767676;
      margin-bottom: 28px;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #4B5563;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }
    .form-input-wrap { position: relative; }
    .form-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: #9CA3AF;
      font-size: 14px;
      pointer-events: none;
    }
    .form-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      background: #E7E7E7;
      border: 1px solid rgba(33,33,33,0.15);
      border-radius: 20px;
      color: #212121;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .form-input:focus {
      border-color: #E9713C;
      box-shadow: 0 0 0 3px rgba(235,89,5,0.1);
      background: #fff;
    }
    .form-input::placeholder { color: #9CA3AF; }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 11px;
      background: #E9713C;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-login:hover:not(:disabled) {
      background: #C94D04;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(235,89,5,0.3);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Error alert */
    .alert-error {
      background: rgba(231,24,24,0.06);
      border: 1px solid rgba(231,24,24,0.2);
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 13px;
      color: #E71818;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .alert-error.show { display: flex; }

    /* Spinner */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .spinner.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .login-divider {
      text-align: center;
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(33,33,33,0.08);
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon"><i class="bi bi-bar-chart-fill"></i></div>
    <div>
      <div class="brand-name">SkillPulse</div>
      <div class="brand-sub">AUS Intel · NT Gov</div>
    </div>
  </div>

  <!-- Card -->
  <div class="login-card">
    <div class="login-title">Sign in</div>
    <div class="login-sub">Australian Job Market Intelligence Platform</div>

    <!-- Error -->
    <div class="alert-error" id="alertError">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="alertMsg">Invalid email or password.</span>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="form-input-wrap">
        <i class="bi bi-envelope form-icon"></i>
        <input type="email" class="form-input" id="inputEmail"
               placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="form-input-wrap">
        <i class="bi bi-lock form-icon"></i>
        <input type="password" class="form-input" id="inputPassword"
               placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText"><i class="bi bi-box-arrow-in-right"></i>&nbsp;Sign In</span>
    </button>

    <div class="login-divider">
      SkillPulse v{{ app_version }} &nbsp;·&nbsp; MSIT402 CIM-10236
    </div>
  </div>

</div>

<script>
'use strict';

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email    = document.getElementById('inputEmail').value.trim();
  const password = document.getElementById('inputPassword').value;
  const btn      = document.getElementById('btnLogin');
  const spinner  = document.getElementById('spinner');
  const btnText  = document.getElementById('btnText');
  const alertEl  = document.getElementById('alertError');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  btn.disabled = true;
  spinner.classList.add('show');
  btnText.style.display = 'none';
  alertEl.classList.remove('show');

  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    const data = await response.json();

    if (!response.ok) {
      showError(data.detail || 'Invalid email or password.');
      return;
    }

    // Derive clean display name — strip domain if it looks like an email
    const rawName    = data.display_name || data.email || '';
    const displayName = rawName.includes('@') ? rawName.split('@')[0] : rawName;

    localStorage.setItem('sp_token', data.access_token);
    localStorage.setItem('sp_user', JSON.stringify({
      user_id:      data.user_id,
      email:        data.email,
      display_name: displayName,
      role:         data.role,
    }));

    window.location.href = '/';

  } catch (err) {
    showError('Could not connect to server. Please try again.');
    console.error('[Login]', err);
  } finally {
    btn.disabled = false;
    spinner.classList.remove('show');
    btnText.style.display = '';
  }
}

function showError(msg) {
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertError').classList.add('show');
}
</script>
</body>
</html>
